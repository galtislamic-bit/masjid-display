<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Galt Islamic Centre</title>

<style>

body{
background:#ffffff;
font-family:Segoe UI;
text-align:center;
margin:0;
color:#0a2a4a;
}

/* LOGO */

.logo img{
width:220px;
margin-top:20px;
}

/* MASJID NAME */

.masjid{
font-size:46px;
font-weight:600;
color:#2a79c5;
margin-top:5px;
}

/* CLOCK */

.clock{
font-size:65px;
margin-top:10px;
}

.date{
font-size:26px;
color:#666;
margin-bottom:25px;
}

/* TABLE */

table{
width:90%;
margin:auto;
border-collapse:collapse;
font-size:40px;
}

th{
color:#2a79c5;
padding:12px;
border-bottom:3px solid #2a79c5;
}

td{
padding:14px;
border-bottom:1px solid #ddd;
}

.prayer{
text-align:left;
font-weight:600;
}

/* NEXT SALAH */

.nextTitle{
margin-top:30px;
font-size:38px;
color:#2a79c5;
}

.countdown{
font-size:55px;
margin-top:10px;
}

/* JUMUAH */

.jumah{
margin-top:25px;
font-size:32px;
color:#2a79c5;
}

</style>

</head>

<body>

<div class="logo">
<img src="galt-logo.png">
</div>

<div class="masjid">
GALT ISLAMIC CENTRE
</div>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<table id="salahTable">

<tr>
<th>Prayer</th>
<th>Adhan</th>
<th>Iqamah</th>
</tr>

</table>

<div class="nextTitle">
Next Salah
</div>

<div class="countdown" id="countdown">
--
</div>

<div class="jumah">
Jumuah • 1:45 PM • 2:30 PM
</div>

<script>

/* ===== PRAYER DATA (MARCH SAMPLE) ===== */

const salah = {

1:{fajrA:"5:38 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:25 PM",asrJ:"5:15 PM",maghribA:"6:13 PM",ishaA:"7:29 PM",ishaJ:"7:50 PM"},
2:{fajrA:"5:37 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:26 PM",asrJ:"5:15 PM",maghribA:"6:14 PM",ishaA:"7:30 PM",ishaJ:"7:50 PM"},
3:{fajrA:"5:35 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:27 PM",asrJ:"5:15 PM",maghribA:"6:15 PM",ishaA:"7:32 PM",ishaJ:"7:50 PM"},
4:{fajrA:"5:33 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:28 PM",asrJ:"5:15 PM",maghribA:"6:17 PM",ishaA:"7:33 PM",ishaJ:"7:50 PM"},
5:{fajrA:"5:32 AM",fajrJ:"5:50 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:29 PM",asrJ:"5:15 PM",maghribA:"6:18 PM",ishaA:"7:34 PM",ishaJ:"7:50 PM"}

}

/* ===== CLOCK ===== */

function updateClock(){

let now = new Date()

document.getElementById("clock").innerHTML =
now.toLocaleTimeString()

document.getElementById("date").innerHTML =
now.toLocaleDateString(undefined,{
weekday:"long",
month:"long",
day:"numeric"
})

}

setInterval(updateClock,1000)
updateClock()

/* ===== ADD 2 MINUTES FUNCTION ===== */

function add2Minutes(time){

let [hour,min] = time.split(":")
let minute = parseInt(min)

minute += 2

if(minute >= 60){
minute -= 60
hour = parseInt(hour) + 1
}

return hour + ":" + minute.toString().padStart(2,"0")

}

/* ===== LOAD TODAY ===== */

function loadToday(){

let day = new Date().getDate()

let t = salah[day]

if(!t) return

let maghribIqama = add2Minutes(t.maghribA.replace(" PM",""))

let html = `
<tr><td class="prayer">FAJR</td><td>${t.fajrA}</td><td>${t.fajrJ}</td></tr>
<tr><td class="prayer">ZUHR</td><td>${t.zuhrA}</td><td>${t.zuhrJ}</td></tr>
<tr><td class="prayer">ASR</td><td>${t.asrA}</td><td>${t.asrJ}</td></tr>
<tr><td class="prayer">MAGHRIB</td><td>${t.maghribA}</td><td>${maghribIqama}</td></tr>
<tr><td class="prayer">ISHA</td><td>${t.ishaA}</td><td>${t.ishaJ}</td></tr>
`

document.getElementById("salahTable").innerHTML += html

}

loadToday()

</script>

</body>
</html>
