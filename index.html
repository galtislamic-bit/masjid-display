<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galt Islamic Centre</title>

<style>

html,body{
margin:0;
padding:0;
background:#eef3f9;
font-family:Segoe UI,Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 9x16 display */

.container{
width:9in;
height:16in;
background:white;
box-shadow:0 0 25px rgba(0,0,0,0.2);
padding:30px;
box-sizing:border-box;
display:flex;
flex-direction:column;
align-items:center;
}

.logo img{
width:170px;
margin-bottom:10px;
}

.masjid{
font-size:48px;
font-weight:700;
color:#2a79c5;
margin-bottom:10px;
text-align:center;
}

.clock{
font-size:70px;
font-weight:600;
margin-top:5px;
}

.date{
font-size:26px;
color:#666;
margin-bottom:25px;
}

table{
width:100%;
border-collapse:collapse;
font-size:42px;
}

th{
color:#2a79c5;
border-bottom:4px solid #2a79c5;
padding:15px;
}

td{
padding:18px;
border-bottom:1px solid #ddd;
}

.prayer{
font-weight:600;
text-align:left;
}

.jumah{
margin-top:auto;
font-size:32px;
color:#2a79c5;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="galt-logo.png" alt="Logo">
</div>

<div class="masjid">
GALT ISLAMIC CENTRE
</div>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<table>

<tr>
<th>Prayer</th>
<th>Adhan</th>
<th>Iqamah</th>
</tr>

<tr>
<td class="prayer">Fajr</td>
<td id="fajrA"></td>
<td id="fajrJ"></td>
</tr>

<tr>
<td class="prayer">Zuhr</td>
<td id="zuhrA"></td>
<td id="zuhrJ"></td>
</tr>

<tr>
<td class="prayer">Asr</td>
<td id="asrA"></td>
<td id="asrJ"></td>
</tr>

<tr>
<td class="prayer">Maghrib</td>
<td id="maghribA"></td>
<td id="maghribJ"></td>
</tr>

<tr>
<td class="prayer">Isha</td>
<td id="ishaA"></td>
<td id="ishaJ"></td>
</tr>

</table>

<div class="jumah" id="jumah"></div>

</div>

<script>

/* CLOCK */
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById("date").innerHTML =
        now.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

/* TIME FUNCTIONS */
function minus10(time){
    let d = new Date("1/1/2000 " + time);
    d.setMinutes(d.getMinutes()-10);
    return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

function plus5(time){
    let d = new Date("1/1/2000 " + time);
    d.setMinutes(d.getMinutes()+5);
    return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

/* DATA (IQAMAH + SUNSET) */
const timetable = {

3:{ // March
    1:{fajr:"6:00 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:13 PM",isha:"7:50 PM",jumah:"1:45 PM"},
    2:{fajr:"6:00 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:14 PM",isha:"7:50 PM",jumah:"1:45 PM"},
    3:{fajr:"6:00 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:15 PM",isha:"7:50 PM",jumah:"1:45 PM"},
    4:{fajr:"6:00 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:17 PM",isha:"7:50 PM",jumah:"1:45 PM"},
    5:{fajr:"5:50 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:18 PM",isha:"7:50 PM",jumah:"1:45 PM"}
},

4:{ // April example
    1:{fajr:"6:15 AM",zuhr:"2:30 PM",asr:"6:30 PM",sunset:"7:48 PM",isha:"9:30 PM",jumah:"2:30 PM"},
    2:{fajr:"6:15 AM",zuhr:"2:30 PM",asr:"6:30 PM",sunset:"7:50 PM",isha:"9:30 PM",jumah:"2:30 PM"},
    3:{fajr:"6:15 AM",zuhr:"2:30 PM",asr:"6:30 PM",sunset:"7:51 PM",isha:"9:30 PM",jumah:"2:30 PM"}
}

};

/* LOAD TODAY */
let now = new Date();
let m = now.getMonth() + 1;
let d = now.getDate();
let t;

if(timetable[m]){
    let availableDays = Object.keys(timetable[m]).map(Number).sort((a,b)=>a-b);
    let selectedDay = availableDays[0];
    for(let day of availableDays){
        if(day <= d){
            selectedDay = day;
        } else {
            break;
        }
    }
    t = timetable[m][selectedDay];
}

if(t){  // only fill table if t exists
    document.getElementById("fajrJ").innerHTML = t.fajr;
    document.getElementById("fajrA").innerHTML = minus10(t.fajr);

    document.getElementById("zuhrJ").innerHTML = t.zuhr;
    document.getElementById("zuhrA").innerHTML = minus10(t.zuhr);

    document.getElementById("asrJ").innerHTML = t.asr;
    document.getElementById("asrA").innerHTML = minus10(t.asr);

    document.getElementById("maghribJ").innerHTML = plus5(t.sunset);
    document.getElementById("maghribA").innerHTML = t.sunset;

    document.getElementById("ishaJ").innerHTML = t.isha;
    document.getElementById("ishaA").innerHTML = minus10(t.isha);

    document.getElementById("jumah").innerHTML = "Jumuah • " + t.jumah;
}

</script>

</body>
</html>
