<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galt Islamic Centre</title>
<style>
/* ===== FULL SCREEN & VERTICAL ORIENTATION ===== */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: "Segoe UI", sans-serif;
    color: #0a2a4a;
}

/* Rotate content to fit vertical 9:16 TV */
.screen-wrapper {
    width: 100vh;               /* full height becomes width */
    height: 100vw;              /* full width becomes height */
    transform: rotate(90deg);   /* rotate content */
    transform-origin: top left;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    box-sizing: border-box;
    padding-top: 20px;
}

/* LOGO */
.logo img {
    width: 180px;
    margin-bottom: 10px;
}

/* MASJID NAME */
.masjid {
    font-size: 40px;
    font-weight: 600;
    color: #2a79c5;
    margin-bottom: 15px;
}

/* CLOCK */
.clock {
    font-size: 55px;
    margin-top: 0;
}
.date {
    font-size: 24px;
    color: #666;
    margin-bottom: 20px;
}

/* TABLE */
table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    font-size: 32px;
}
th {
    color: #2a79c5;
    padding: 10px;
    border-bottom: 3px solid #2a79c5;
}
td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}
.prayer {
    text-align: left;
    font-weight: 600;
}

/* NEXT SALAH */
.nextTitle {
    margin-top: 20px;
    font-size: 32px;
    color: #2a79c5;
}
.countdown {
    font-size: 45px;
    margin-top: 10px;
}

/* JUMUAH */
.jumah {
    margin-top: 15px;
    font-size: 28px;
    color: #2a79c5;
}
</style>
</head>

<body>
<div class="screen-wrapper">

    <div class="logo">
        <img src="galt-logo.png" alt="Galt Logo">
    </div>

    <div class="masjid">
        GALT ISLAMIC CENTRE
    </div>

    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>

    <table id="salahTable">
        <tr>
            <th>Prayer</th>
            <th>Adhan</th>
            <th>Iqamah</th>
        </tr>
    </table>

    <div class="nextTitle">
        Next Salah
    </div>

    <div class="countdown" id="countdown">
        --
    </div>

    <div class="jumah">
        Jumuah • 1:45 PM • 2:30 PM
    </div>

</div>

<script>
/* ===== PRAYER DATA ===== */
const salah = {
1:{fajrA:"5:38 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:25 PM",asrJ:"5:15 PM",maghribA:"6:13 PM",ishaA:"7:29 PM",ishaJ:"7:50 PM"},
2:{fajrA:"5:37 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:26 PM",asrJ:"5:15 PM",maghribA:"6:14 PM",ishaA:"7:30 PM",ishaJ:"7:50 PM"},
3:{fajrA:"5:35 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:27 PM",asrJ:"5:15 PM",maghribA:"6:15 PM",ishaA:"7:32 PM",ishaJ:"7:50 PM"},
4:{fajrA:"5:33 AM",fajrJ:"6:00 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:28 PM",asrJ:"5:15 PM",maghribA:"6:17 PM",ishaA:"7:33 PM",ishaJ:"7:50 PM"},
5:{fajrA:"5:32 AM",fajrJ:"5:50 AM",zuhrA:"12:33 PM",zuhrJ:"1:45 PM",asrA:"4:29 PM",asrJ:"5:15 PM",maghribA:"6:18 PM",ishaA:"7:34 PM",ishaJ:"7:50 PM"}
}

/* ===== CLOCK ===== */
function updateClock(){
let now = new Date();
document.getElementById("clock").innerHTML = now.toLocaleTimeString();
document.getElementById("date").innerHTML = now.toLocaleDateString(undefined,{
    weekday:"long",
    month:"long",
    day:"numeric"
});
}
setInterval(updateClock,1000);
updateClock();

/* ===== ADD 2 MINUTES FUNCTION ===== */
function add2Minutes(time){
let [hour,min] = time.split(":");
let minute = parseInt(min);
minute += 2;
if(minute >= 60){
    minute -= 60;
    hour = parseInt(hour) + 1;
}
return hour + ":" + minute.toString().padStart(2,"0");
}

/* ===== LOAD TODAY ===== */
function loadToday(){
let day = new Date().getDate();
let t = salah[day];
if(!t) return;
let maghribIqama = add2Minutes(t.maghribA.replace(" PM",""));
let html = `
<tr><td class="prayer">FAJR</td><td>${t.fajrA}</td><td>${t.fajrJ}</td></tr>
<tr><td class="prayer">ZUHR</td><td>${t.zuhrA}</td><td>${t.zuhrJ}</td></tr>
<tr><td class="prayer">ASR</td><td>${t.asrA}</td><td>${t.asrJ}</td></tr>
<tr><td class="prayer">MAGHRIB</td><td>${t.maghribA}</td><td>${maghribIqama}</td></tr>
<tr><td class="prayer">ISHA</td><td>${t.ishaA}</td><td>${t.ishaJ}</td></tr>
`;
document.getElementById("salahTable").innerHTML += html;
}
loadToday();
</script>

</body>
</html>
