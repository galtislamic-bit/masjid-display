<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galt Islamic Centre</title>
<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef3f9;
    font-family:"Segoe UI", Arial, sans-serif;
}

.container {
    height:100vh; /* full screen height */
    width: calc(100vh * 9 / 16); /* maintain 9:16 ratio */
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:2%;
    box-sizing:border-box;
}

.logo img {
    width:25%; /* relative to container width */
    margin-bottom:1%;
}

.masjid {
    font-size:3vw;
    font-weight:bold;
    color:#2a79c5;
    text-align:center;
    margin-bottom:1%;
}

.clock {
    font-size:4vw;
    font-weight:600;
    margin-bottom:0.5%;
}

.date {
    font-size:2vw;
    color:#666;
    margin-bottom:2%;
}

table {
    width:95%;
    border-collapse:collapse;
    font-size:2vw;
    table-layout: fixed; /* ensures fixed column widths */
}

th, td {
    padding:0.3vw 0;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.prayer {
    text-align:left;
    padding-left:0.5vw;
    width:35%;   /* Give more space to prayer names */
}

th:first-child {
    width:35%;   /* same for header */
}

th:nth-child(2), td:nth-child(2),
th:nth-child(3), td:nth-child(3) {
    width:32.5%; /* remaining space evenly split */
}

.jumah {
    margin-top:auto;
    font-size:2.5vw;
    color:#2a79c5;
    font-weight:600;
    margin-bottom:1%;
}
</style>
</head>
<body>

<div class="container">

<div class="logo">
    <img src="galt-logo.png" alt="logo">
</div>

<div class="masjid">GALT ISLAMIC CENTRE</div>

<div class="clock" id="clock">--:--:--</div>
<div class="date" id="date">Loading...</div>

<table>
<tr><th>Prayer</th><th>Adhan</th><th>Iqamah</th></tr>
<tr><td class="prayer">Fajr</td><td id="fajrA"></td><td id="fajrJ"></td></tr>
<tr><td class="prayer">Zuhr</td><td id="zuhrA"></td><td id="zuhrJ"></td></tr>
<tr><td class="prayer">Asr</td><td id="asrA"></td><td id="asrJ"></td></tr>
<tr><td class="prayer">Maghrib</td><td id="maghribA"></td><td id="maghribJ"></td></tr>
<tr><td class="prayer">Isha</td><td id="ishaA"></td><td id="ishaJ"></td></tr>
</table>

<div class="jumah" id="jumah"></div>

</div>

<script>
// Clock & Date
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerHTML = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById("date").innerHTML = now.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
}
setInterval(updateClock,1000);
updateClock();

// Time functions
function minus10(time){ let d=new Date("1/1/2000 "+time); d.setMinutes(d.getMinutes()-10); return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});}
function plus2(time){ let d=new Date("1/1/2000 "+time); d.setMinutes(d.getMinutes()+2); return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});}

// Example timetable
const timetable = {3:{1:{fajr:"6:00 AM",zuhr:"1:45 PM",asr:"5:15 PM",sunset:"6:13 PM",isha:"7:50 PM",jumah:"1:45 PM"}}};

let nowD = new Date();
let m = nowD.getMonth()+1;
let d = nowD.getDate();
let t;
if(timetable[m]){
    let days=Object.keys(timetable[m]).map(Number).sort((a,b)=>a-b);
    let selected=days[0];
    for(let day of days){ if(day<=d) selected=day; else break; }
    t=timetable[m][selected];
}

if(t){
document.getElementById("fajrA").innerHTML = minus10(t.fajr); document.getElementById("fajrJ").innerHTML=t.fajr;
document.getElementById("zuhrA").innerHTML = minus10(t.zuhr); document.getElementById("zuhrJ").innerHTML=t.zuhr;
document.getElementById("asrA").innerHTML = minus10(t.asr); document.getElementById("asrJ").innerHTML=t.asr;
document.getElementById("maghribA").innerHTML=t.sunset; document.getElementById("maghribJ").innerHTML=plus2(t.sunset);
document.getElementById("ishaA").innerHTML=minus10(t.isha); document.getElementById("ishaJ").innerHTML=t.isha;
document.getElementById("jumah").innerHTML="Jumuah • "+t.jumah;
}
</script>

</body>
</html>
